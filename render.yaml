services:
  - type: web
    name: retailers-ai-pricing-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: APP_ROOT
        value: /opt/render/project/src